<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Linux Kernel 企业贡献数据看板</title>
  <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🐧</text></svg>" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;600;700&family=Noto+Sans+Mono+SC:wght@400;500;700&display=swap" />
</head>
<body>
  <div id="app">
    <header>
      <h1>🐧 Linux Kernel 企业贡献数据看板</h1>
      <p class="subtitle">数据来源: <a href="https://remword.com/kps_result/" target="_blank">remword.com KPS</a> | 数据日期: 2026-06-14</p>
    </header>

    <div class="controls">
      <div class="control-group">
        <label for="top-n">图表显示：</label>
        <input type="number" id="top-n" value="30" min="5" max="500" />
        <span class="hint">条</span>
      </div>
    </div>

    <div class="version-bar-wrapper">
      <div class="version-bar-label">KERNEL_VERSIONS:</div>
      <div class="version-bar" id="version-bar">
        <!-- 版本标签由 JS 动态生成 -->
      </div>
    </div>

    <div class="tab-bar">
      <button class="tab-btn active" data-tab="all">[ ALL ] 全部企业</button>
      <button class="tab-btn" data-tab="cn">[ CN ] 中国企业</button>
    </div>

    <div class="dashboard">
      <div class="card chart-card">
        <div id="chart-loading" class="chart-loading">⏳ 加载中…</div>
        <div id="chart-empty" class="chart-empty" style="display:none;">[!] 当前版本无中国企业贡献</div>
        <div id="chart" style="width:100%;height:500px;"></div>
      </div>
      <div class="card summary-card">
        <div id="summary">
          <h2>版本概览</h2>
          <div class="summary-stats">
            <div class="stat">
              <span class="stat-label">总提交数</span>
              <span class="stat-value" id="stat-total">-</span>
            </div>
            <div class="stat" id="stat-cn-row" style="display:none;">
              <span class="stat-label">中国企业提交数</span>
              <span class="stat-value" id="stat-cn-total" style="color:#ff8866;">-</span>
            </div>
            <div class="stat">
              <span class="stat-label">企业/组织数</span>
              <span class="stat-value" id="stat-companies">-</span>
            </div>
          </div>
        </div>
      </div>
    </div>

    <div class="card table-card">
      <h2>详细数据表</h2>
      <p class="table-hint">⓵ 完整列表: 表格内显示全部企业, 含被合并到 "Other" 的小贡献厂商</p>
      <div class="table-wrapper">
        <table id="data-table">
          <thead>
            <tr>
              <th>排名</th>
              <th>企业/组织</th>
              <th>Commit 数</th>
              <th>占比</th>
            </tr>
          </thead>
          <tbody id="table-body"></tbody>
        </table>
      </div>
    </div>

    <footer>
      <p>数据自动抓取自 <a href="https://remword.com/kps_result/" target="_blank">remword.com KPS</a> · 由 kps_scraper.py 生成</p>
    </footer>
  </div>
  <script type="module" src="/src/main.js"></script>
</body>
</html>
