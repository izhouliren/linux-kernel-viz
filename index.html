<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Linux Kernel 企业贡献数据看板</title>
  <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🐧</text></svg>" />
</head>
<body>
  <div id="app">
    <header>
      <h1>🐧 Linux Kernel 企业贡献数据看板</h1>
      <p class="subtitle">数据来源: <a href="https://remword.com/kps_result/" target="_blank">remword.com KPS</a> | 数据日期: 2026-06-14</p>
    </header>

    <div class="controls">
      <div class="control-group">
        <label for="version-select">选择内核版本：</label>
        <select id="version-select">
          <option value="">-- 加载中 --</option>
        </select>
      </div>
      <div class="control-group">
        <label for="top-n">显示 Top：</label>
        <input type="number" id="top-n" value="15" min="5" max="100" />
      </div>
    </div>

    <div class="dashboard">
      <div class="card chart-card">
        <div id="chart" style="width:100%;height:500px;"></div>
      </div>
      <div class="card summary-card">
        <div id="summary">
          <h2>版本概览</h2>
          <div class="summary-stats">
            <div class="stat">
              <span class="stat-label">总提交数</span>
              <span class="stat-value" id="stat-total">-</span>
            </div>
            <div class="stat">
              <span class="stat-label">企业/组织数</span>
              <span class="stat-value" id="stat-companies">-</span>
            </div>
            <div class="stat">
              <span class="stat-label">Top 1</span>
              <span class="stat-value" id="stat-top1">-</span>
            </div>
          </div>
        </div>
      </div>
    </div>

    <div class="card table-card">
      <h2>详细数据表</h2>
      <div class="table-wrapper">
        <table id="data-table">
          <thead>
            <tr>
              <th>排名</th>
              <th>企业/组织</th>
              <th>Commit 数</th>
              <th>占比</th>
            </tr>
          </thead>
          <tbody id="table-body"></tbody>
        </table>
      </div>
    </div>

    <footer>
      <p>数据自动抓取自 <a href="https://remword.com/kps_result/" target="_blank">remword.com KPS</a> · 由 kps_scraper.py 生成</p>
    </footer>
  </div>
  <script type="module" src="/src/main.js"></script>
</body>
</html>
